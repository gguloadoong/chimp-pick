name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        working-directory: apps/web
        run: npx eslint src/

      - name: TypeScript check
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: apps/web
        run: npx vitest run

      - name: Build
        working-directory: apps/web
        run: npx next build
